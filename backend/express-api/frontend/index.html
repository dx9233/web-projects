<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend - Express App</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: white;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      header {
        text-align: center;
        margin-bottom: 40px;
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }
      .subtitle {
        font-size: 1.2rem;
        opacity: 0.9;
      }
      .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }
      .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .card h3 {
        margin-bottom: 15px;
        font-size: 1.5rem;
      }
      .btn {
        display: inline-block;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        padding: 12px 25px;
        border-radius: 50px;
        text-decoration: none;
        margin-top: 15px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: all 0.3s ease;
      }
      .btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
      }
      .api-test {
        margin-top: 30px;
        padding: 20px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 10px;
      }
      #usersList {
        margin-top: 10px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 5px;
        min-height: 50px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Express App</h1>
        <p class="subtitle">Frontend interface for API testing</p>
      </header>

      <div class="dashboard">
        <div class="card">
          <h3>Statistic</h3>
          <p>User online: <strong id="onlineUsers">0</strong></p>
          <p>API status: <span id="apiStatus">Checking...</span></p>
          <a href="/admin" class="btn">Go to admin</a>
        </div>

        <div class="card">
          <h3>Users</h3>
          <p>Test API users</p>
          <button onclick="loadUsers()" class="btn">
            Loading users
          </button>
          <div id="usersList"></div>
        </div>

        <div class="card">
          <h3>API Endpoints</h3>
          <ul>
            <li><code>GET /api</code> - Base endpoint</li>
            <li><code>GET /api/users</code> - List of users</li>
            <li><code>POST /api/login</code> - Auth</li>
          </ul>
        </div>
      </div>

      <div class="api-test">
        <h3>Test API</h3>
        <div>
          <button onclick="testApi()" class="btn">Test /api</button>
          <button onclick="clearData()" class="btn">Clean</button>
          <div
            id="apiResult"
            style="
              margin-top: 15px;
              padding: 15px;
              background: rgba(0, 0, 0, 0.3);
              border-radius: 5px;
            "
          ></div>
        </div>
      </div>
    </div>

    <script>
      // API check on boot
      window.onload = function () {
        fetch("/api")
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("apiStatus").innerHTML =
              `<span style="color: #4ade80;">Active</span>`;
            document.getElementById("apiStatus").innerHTML +=
              `<br><small>${data.message}</small>`;
          })
          .catch(() => {
            document.getElementById("apiStatus").innerHTML =
              `<span style="color: #f87171;">Error</span>`;
          });

        // Random number of online users
        document.getElementById("onlineUsers").textContent =
          Math.floor(Math.random() * 100) + 1;
      };

      function loadUsers() {
        const usersList = document.getElementById("usersList");
        usersList.innerHTML = "<p>Load...</p>";

        fetch("/api/users")
          .then((res) => res.json())
          .then((users) => {
            if (users.length > 0) {
              let html = "<ul>";
              users.forEach((user) => {
                html += `<li>${user.name} (ID: ${user.id})</li>`;
              });
              html += "</ul>";
              usersList.innerHTML = html;
            } else {
              usersList.innerHTML = "<p>No users</p>";
            }
          })
          .catch((error) => {
            usersList.innerHTML = `<p style="color: #f87171;">Error: ${error}</p>`;
          });
      }

      function testApi() {
        const resultDiv = document.getElementById("apiResult");
        resultDiv.innerHTML = "<p>Test...</p>";

        Promise.all([
          fetch("/api").then((res) => res.json()),
          fetch("/api/users").then((res) => res.json()),
        ])
          .then(([apiData, usersData]) => {
            resultDiv.innerHTML = `
                    <p><strong>The API is working correctly.</strong></p>
                    <p>Base endpoint: ${apiData.message}</p>
                    <p>Users found: ${usersData.length}</p>
                    <p>Time: ${new Date().toLocaleTimeString()}</p>
                `;
          })
          .catch((error) => {
            resultDiv.innerHTML = `<p style="color: #f87171;"><strong>Error API:</strong> ${error}</p>`;
          });
      }

      function clearData() {
        document.getElementById("usersList").innerHTML = "";
        document.getElementById("apiResult").innerHTML = "";
      }
    </script>
  </body>
</html>
